name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Capture metrics run date
        run: echo "METRICS_RUN_DATE=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_ENV"

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          filename: github-metrics.svg
          config_timezone: Asia/Tokyo
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_habits: no
          plugin_languages: yes
          plugin_languages_limit: 5
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming
          plugin_languages_recent_days: 30

      - name: Post-process 3D contribution graph
        run: python3 scripts/postprocess_3d_contribution_graph.py github-metrics.svg

      - name: Update README metrics cache key
        run: |
          METRICS_VERSION="${{ github.run_id }}-${{ github.run_attempt }}"
          METRICS_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/github-metrics.svg?v=${METRICS_VERSION}"
          sed -i'' -E "s#<img src=\"[^\"]+\" alt=\"GitHub Metrics\" />#  <img src=\"${METRICS_URL}\" alt=\"GitHub Metrics\" />#" README.md
          git add github-metrics.svg README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: bust metrics image cache [Skip GitHub Action]"
          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              CONFLICT_FILES="$(git diff --name-only --diff-filter=U | tr '\n' ' ')"
              if [ "${CONFLICT_FILES}" = "README.md github-metrics.svg " ] || [ "${CONFLICT_FILES}" = "github-metrics.svg README.md " ] || [ "${CONFLICT_FILES}" = "github-metrics.svg " ] || [ "${CONFLICT_FILES}" = "README.md " ]; then
                git checkout --theirs -- github-metrics.svg README.md || true
                git add github-metrics.svg README.md
                GIT_EDITOR=true git rebase --continue
              else
                git rebase --abort || true
                if [ "${attempt}" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 5))
                continue
              fi
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 5))
          done
